<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Main Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: rgb(245, 245, 245);
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      height: 100vh;
    }

    .a-container {
      background-color: rgba(20, 20, 20, 0.9);
      border: 2px solid rgba(0, 0, 0, 0.8);
      border-radius: 20px;
      display: flex;
      gap: 30px;
      padding: 25px 40px;
      font-size: 24px;
      color: rgb(240, 240, 240);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .a-container a {
      text-decoration: none;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .a-container a:hover {
      background-color: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .title {
      position: absolute;
      top: 30px;
      font-size: 32px;
      color: #333;
    }
  </style>
</head>
<body>
     <div class="title">🏆 Sports Hub</div>

    <div class="a-container">
        <a href="{% url 'football' %}">⚽ Football</a>
        <a href="{% url 'hockey' %}">🏒 Hockey</a>
        <a href="{% url 'basketball' %}">🏀 Basketball</a>
    </div>

    {% block content %}
    {% endblock %}

</body>
</html>
